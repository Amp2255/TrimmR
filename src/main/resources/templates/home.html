<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Trim-It</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            overflow: hidden;
            color: white;
        }

        /* Floating glow circles */
        .bg-blur {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.5;
            z-index: 0;
        }

        .blur1 {
            width: 300px;
            height: 300px;
            background: #38bdf8;
            top: -50px;
            left: -50px;
        }

        .blur2 {
            width: 250px;
            height: 250px;
            background: #8b5cf6;
            bottom: -60px;
            right: -60px;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 500px;
            padding: 40px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            text-align: center;
            animation: fadeIn 0.8s ease;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: #cbd5e1;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input[type="text"] {
            padding: 15px;
            border: none;
            border-radius: 14px;
            outline: none;
            font-size: 1rem;
            background: rgba(255,255,255,0.12);
            color: white;
            transition: 0.3s;
        }

        input[type="text"]::placeholder {
            color: #cbd5e1;
        }

        input[type="text"]:focus {
            background: rgba(255,255,255,0.18);
            box-shadow: 0 0 10px rgba(56,189,248,0.5);
        }

        button {
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #38bdf8, #8b5cf6);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 20px rgba(139,92,246,0.4);
        }

        .result, .error {
            margin-top: 25px;
            padding: 15px;
            border-radius: 14px;
            animation: pop 0.4s ease;
        }

        .result {
            background: rgba(34,197,94,0.15);
            border: 1px solid rgba(34,197,94,0.4);
        }

        .result a {
            color: #4ade80;
            text-decoration: none;
            font-weight: 500;
            word-break: break-all;
        }

        .result a:hover {
            text-decoration: underline;
        }

        .error {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.4);
            color: #fca5a5;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pop {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        footer {
            margin-top: 25px;
            font-size: 0.8rem;
            color: #94a3b8;
        }
    </style>
</head>

<body>

    <div class="bg-blur blur1"></div>
    <div class="bg-blur blur2"></div>

    <div class="container">
        <h2>TrimiT</h2>
        <p class="subtitle">
            Turn long messy URLs into clean, shareable links instantly.
        </p>

        <!-- Form -->
        <form action="/shorten" method="post">
            <input 
                type="text" 
                name="urlString" 
                placeholder="Paste your long URL here..."
                required 
            />
            <button type="submit">Shorten URL</button>
        </form>

        <!-- Result -->
        <div class="result" th:if="${shortUrl}">
            <p>Your short URL is ready:</p>
            <a th:href="${shortUrl}" 
               th:text="${shortUrl}" 
               target="_blank">
            </a>
        </div>

        <!-- Error -->
        <div class="error" th:if="${error}">
            <p th:text="${error}"></p>
        </div>

        <footer>
            Built with Spring Boot + Thymeleaf 🚀
        </footer>
    </div>

</body>
</html>
